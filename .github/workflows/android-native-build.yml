name: Android Native Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Capacitor dependencies
        run: npm install --legacy-peer-deps

      - name: Grant execute permission for Cap CLI
        run: chmod +x ./node_modules/.bin/cap

      - name: Add Android platform (if missing)
        run: npx @capacitor/cli add android
        continue-on-error: true

      - name: Sync Capacitor with Android
        run: npx @capacitor/cli sync android

      - name: Inject Health Connect manifest entries
        run: node scripts/patch-android-manifest.mjs

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
